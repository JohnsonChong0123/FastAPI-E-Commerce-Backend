name: Build and Deploy to Azure

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  ACR_NAME: myecommerceacr2025
  WEBAPP_NAME: myfastapiecom001
  RESOURCE_GROUP: myEcommerceRG

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx psycopg2-binary
    
    - name: Wait for PostgreSQL to be ready
      run: |
        for i in {1..10}; do
          pg_isready -h localhost -U postgres && break || sleep 5
        done
    
    - name: Run tests with coverage
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        TOKEN_SECRET_KEY: test_secret_key_for_ci_only
        GOOGLE_CLIENT_ID: test_client_id
        EBAY_CLIENT_ID: test_ebay_id
        EBAY_CLIENT_SECRET: test_ebay_secret
      run: |
        pytest --cov=. --cov-report=xml --cov-report=term -v
    
    - name: Upload coverage to Codecov (optional)
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  build-and-deploy:
    needs: test 
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Login to ACR
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.ACR_NAME }}.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
    
    - name: Build and push Docker image
      run: |
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/fastapi-ecommerce:${{ github.sha }} .
        docker push ${{ env.ACR_NAME }}.azurecr.io/fastapi-ecommerce:${{ github.sha }}
        docker tag ${{ env.ACR_NAME }}.azurecr.io/fastapi-ecommerce:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/fastapi-ecommerce:latest
        docker push ${{ env.ACR_NAME }}.azurecr.io/fastapi-ecommerce:latest
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.WEBAPP_NAME }}
        images: ${{ env.ACR_NAME }}.azurecr.io/fastapi-ecommerce:${{ github.sha }}
    
    - name: Configure App Settings
      uses: azure/appservice-settings@v1
      with:
        app-name: ${{ env.WEBAPP_NAME }}
        app-settings-json: |
          [
            {
              "name": "DATABASE_URL",
              "value": "${{ secrets.DATABASE_URL }}",
              "slotSetting": false
            },
            {
              "name": "TEST_DATABASE_URL",
              "value": "${{ secrets.TEST_DATABASE_URL }}",
              "slotSetting": false
            },
            {
              "name": "TOKEN_SECRET_KEY",
              "value": "${{ secrets.TOKEN_SECRET_KEY }}",
              "slotSetting": false
            },
            {
              "name": "GOOGLE_CLIENT_ID",
              "value": "${{ secrets.GOOGLE_CLIENT_ID }}",
              "slotSetting": false
            },
            {
              "name": "EBAY_CLIENT_ID",
              "value": "${{ secrets.EBAY_CLIENT_ID }}",
              "slotSetting": false
            },
            {
              "name": "EBAY_CLIENT_SECRET",
              "value": "${{ secrets.EBAY_CLIENT_SECRET }}",
              "slotSetting": false
            },
            {
              "name": "WEBSITES_PORT",
              "value": "8000",
              "slotSetting": false
            }
          ]
    
    - name: Restart Web App
      run: |
        az webapp restart --name ${{ env.WEBAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} 